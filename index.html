<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>คำนวณ 60/40</title>
    <meta
      name="description"
      content="เว็บคำนวณส่วนลดโครงการ 60/40 โดยรัฐออก 60% สูงสุดวันละ 200 บาท"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app" aria-labelledby="page-title">
      <section class="calculator" aria-label="เครื่องคำนวณโครงการ 60/40">
        <div class="intro">
          <p class="eyebrow">60 / 40 Calculator</p>
          <h1 id="page-title">คำนวณ 60/40</h1>
          <p>
            กรอกช่องไหนก็ได้ ระบบคำนวณทันที<br>
            เกิน 200 จะแจ้งยอดจ่ายเพิ่ม
          </p>
        </div>

        <form class="fields" autocomplete="off">
          <label class="field" for="government">
            <span class="label-text">รัฐออกให้ (60%)</span>
            <span class="input-wrap">
              <input
                id="government"
                name="government"
                type="number"
                inputmode="decimal"
                min="0"
                step="0.01"
                value="200"
              >
              <span>บาท</span>
            </span>
          </label>

          <label class="field" for="customer">
            <span class="label-text">เราต้องออก (40%)</span>
            <span class="input-wrap">
              <input
                id="customer"
                name="customer"
                type="number"
                inputmode="decimal"
                min="0"
                step="0.01"
                value="133.33"
              >
              <span>บาท</span>
            </span>
          </label>

          <label class="field" for="total">
            <span class="label-text">ราคาสินค้า</span>
            <span class="input-wrap">
              <input
                id="total"
                name="total"
                type="number"
                inputmode="decimal"
                min="0"
                step="0.01"
                value="333.33"
              >
              <span>บาท</span>
            </span>
          </label>
        </form>

        <div class="summary" aria-live="polite">
          <div>
            <span>สัดส่วนจริง</span>
            <strong id="ratio">รัฐ 60% / เรา 40%</strong>
          </div>
          <div>
            <span>สิทธิรัฐวันละ 200</span>
            <strong id="cap-status">แตะเพดาน 200 บาท</strong>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
